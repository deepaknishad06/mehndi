<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehndi Artists</title>
    <link rel="stylesheet" href="artist.css">
</head>

<body>
    <!-- ###################NavBar##################### -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <h2>👑 Priya's Mehndi</h2>
            </div>
            <ul class="nav-menu" id="mobileMenu">
                <li><a href="index.html" class="nav-link active">🏠 Home</a></li>
                <!-- <li><a href="#gallery" class="nav-link">Gallery</a></li> -->
                <li><a href="artist.html" class="nav-link">Artists</a></li>
                <li><a href="index.html" class="nav-link">Book Now</a></li>
                <li><a href="https://wa.me/918699358629" class="nav-link whatsapp" target="_blank">WhatsApp</a></li>
            </ul>
            <div class="hamburger" id="hamburger">
                <span></span><span></span><span></span>
            </div>
        </div>
    </nav>
    <!-- ###################################### -->
    <div class="container">
        <h1 class="section-title">Our Expert Mehndi Artists</h1>
        <div class="artists-grid" id="artistsGrid">
            <!-- Cards will be generated by JS -->
        </div>
    </div>

    <!-- Artist Detail Modal -->
    <div class="modal" id="artistModal">
        <div class="modal-content">
            <div class="modal-header">
                <button class="close-modal">&times;</button>
                <img src="" alt="" class="modal-image" id="modalImage">
                <h2 id="modalName"></h2>
                <div class="artist-specialty" id="modalSpecialty"></div>
            </div>
            <div class="modal-body">
                <div id="modalDetails"></div>
                <button class="view-details-btn" onclick="bookNow()">Book This Artist</button>
            </div>
        </div>
    </div>

    <script>
        const artists = [
            {
                id: 1,
                name: "Priya Sharma",
                specialty: "Bridal Expert",
                experience: "8+ Years",
                rating: 4.9,
                image: "https://images.unsplash.com/photo-1612349317150-e413f6a5b16d?w=400&h=400&fit=crop&crop=face",
                details: "Priya is our master bridal artist with 8+ years experience. Specializes in intricate Arabic & traditional designs. Perfect for weddings & big events.",
                unavailable: false
            },
            {
                id: 2,
                name: "Aishwarya Rai",
                specialty: "Arabic Style",
                experience: "6 Years",
                rating: 4.8,
                image: "https://images.unsplash.com/photo-1596810575287-61205d343d89?w=400&h=400&fit=crop&crop=face",
                details: "Aishwarya creates breathtaking Arabic mehndi with modern twists. Perfect for party wear & contemporary brides.",
                unavailable: false
            },
            {
                id: 3,
                name: "Neha Gupta",
                specialty: "Kids & Minimal",
                experience: "5 Years",
                rating: 4.7,
                image: "https://images.unsplash.com/photo-1494790108755-2616b612b786?w=400&h=400&fit=crop&crop=face",
                details: "Neha specializes in kid-friendly & minimalist designs. Comfortable working with children & simple elegant patterns.",
                unavailable: false
            },
            {
                id: 4,
                name: "Ritu Singh",
                specialty: "Party Wear",
                experience: "7 Years",
                rating: 4.6,
                image: "https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=400&h=400&fit=crop&crop=face",
                details: "Artist Unavailable - Currently on maternity leave",
                unavailable: true
            },
            {
                id: 5,
                name: "Simran Kaur",
                specialty: "Group Events",
                experience: "4 Years",
                rating: 4.5,
                image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=400&fit=crop&crop=face",
                details: "Artist temporarily unavailable - Back soon!",
                unavailable: true
            }
        ];

        function generateStars(rating) {
            return '★'.repeat(Math.floor(rating)) + '☆'.repeat(5 - Math.floor(rating));
        }

        function createArtistCard(artist) {
            return `
                <div class="artist-card ${artist.unavailable ? 'unavailable' : ''}" data-artist-id="${artist.id}">
                    <div class="card-image">
                        <img src="${artist.image}" alt="${artist.name}" loading="lazy">
                    </div>
                    <div class="card-content">
                        <h3 class="artist-name">${artist.name}</h3>
                        <div class="artist-specialty">${artist.specialty}</div>
                        <div class="artist-experience">${artist.experience} Experience</div>
                        <div class="artist-rating">
                            <span class="stars">${generateStars(artist.rating)}</span>
                            <span class="rating-count">(${artist.rating}/5)</span>
                        </div>
                        <button class="view-details-btn">${artist.unavailable ? 'Unavailable' : 'View Details'}</button>
                    </div>
                </div>
            `;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function () {
            const grid = document.getElementById('artistsGrid');
            artists.forEach(artist => {
                grid.innerHTML += createArtistCard(artist);
            });

            // Card clicks
            document.addEventListener('click', function (e) {
                if (e.target.closest('.artist-card:not(.unavailable) .view-details-btn')) {
                    const card = e.target.closest('.artist-card');
                    const artistId = parseInt(card.dataset.artistId);
                    const artist = artists.find(a => a.id === artistId);
                    showArtistModal(artist);
                }
            });
        });

        function showArtistModal(artist) {
            document.getElementById('modalImage').src = artist.image;
            document.getElementById('modalImage').alt = artist.name;
            document.getElementById('modalName').textContent = artist.name;
            document.getElementById('modalSpecialty').textContent = artist.specialty;
            document.getElementById('modalDetails').innerHTML = `
                <p style="font-size: 1.1rem; line-height: 1.7; color: var(--text-dark); margin-bottom: 20px;">
                    ${artist.details}
                </p>
                <ul style="list-style: none; padding: 0;">
                    <li style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 1rem;">
                        <span style="font-size: 1.2rem; color: var(--emerald);">✓</span>
                        ${artist.experience} of expertise
                    </li>
                    <li style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 1rem;">
                        <span style="font-size: 1.2rem; color: var(--emerald);">✓</span>
                        ${generateStars(artist.rating)} (${artist.rating}/5 Rating)
                    </li>
                    <li style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-size: 1rem;">
                        <span style="font-size: 1.2rem; color: var(--emerald);">✓</span>
                        Specializes in ${artist.specialty.toLowerCase()}
                    </li>
                </ul>
            `;

            document.getElementById('artistModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('artistModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function bookNow() {
            // WhatsApp integration
            const message = `Hi! I want to book ${document.getElementById('modalName').textContent} for mehndi.`;
            window.open(`https://wa.me/919876543210?text=${encodeURIComponent(message)}`, '_blank');
        }

        // Modal controls
        document.getElementById('artistModal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        document.querySelector('.close-modal').addEventListener('click', closeModal);

        // Close on Escape
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>

</html>
